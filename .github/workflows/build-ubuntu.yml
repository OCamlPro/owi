name: build-ubuntu
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: test
        run: |
          set -x

          git clone https://github.com/${{ github.repository }}.git
          cd $(basename ${{ github.repository }})

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-${{ github.event.pull_request.number }}
            git checkout pr-${{ github.event.pull_request.number }}
          else
            git checkout ${{ github.ref_name }}
          fi

          sudo apt update -yqq
          sudo apt install opam -yqq

          # Prepare OCaml stuff
          opam init --disable-sandboxing --bare -ya
          opam switch create ocaml ocaml-base-compiler --criteria="-notuptodate"
          eval "$(opam env)"
          export OPAMCONFIRMLEVEL=unsafe-yes
          opam update

          # install tinygo
          wget https://github.com/tinygo-org/tinygo/releases/download/v0.40.1/tinygo_0.40.1_amd64.deb
          sudo dpkg -i tinygo_0.40.1_amd64.deb

          # Install system and opam-repo dependencies
          opam install . --depext-only --with-test
          opam install . --deps-only --with-test

          rustup target add wasm32-unknown-unknown

          # Build and test
          dune build @install
          dune build @quicktest
